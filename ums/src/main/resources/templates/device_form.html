<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Device</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>Edit Device</h1>
    
    <form th:action="@{/device/save}" th:object="${device}" method="post">
        <input type="hidden" th:field="*{id}" />
        
        <div style="margin-bottom: 1rem;">
            <label>Description:</label>
            <input type="text" th:field="*{description}" style="width: 100%; padding: 0.5rem;" />
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label>Enabled:</label>
            <input type="checkbox" th:field="*{enabled}" />
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn-pill" style="background: #4CAF50; color: white;">Save</button>
            <a th:href="@{/main}" class="btn-pill" style="background: #ccc; color: black; text-decoration: none; text-align: center;">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
